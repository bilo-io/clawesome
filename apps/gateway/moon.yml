# apps/gateway/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'wss-gateway'

dependsOn:
  - 'core'

tags:
  - 'core'
  - 'gateway'
  - 'backend'
  - 'websockets'

tasks:
  start:
    command: 'bun run src/index.ts start'
  dev:
    command: 'bun run src/index.ts dev'
  build:
    script: 'bun build --target node --outfile dist/index.js src/index.ts && bun build --compile --outfile clawesome-gateway dist/index.js'
    inputs:
      - 'src/**/*'
    outputs:
      - 'clawesome-gateway'
