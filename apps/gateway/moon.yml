# apps/gateway/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'wss-gateway'

dependsOn:
  - 'core'

tags:
  - 'core'
  - 'gateway'
  - 'backend'
  - 'websockets'

tasks:
  start:
    command: 'bun run src/index.ts start'
  dev:
    command: 'bun run src/index.ts dev'
  build:
    command: 'bun build ./src/index.ts --outdir ./dist --target bun'
    inputs:
      - 'src/**/*'
