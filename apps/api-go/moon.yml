# apps/api/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'api-go'

tags:
  - 'core'
  - 'api-go'
  - 'backend'

tasks:
  install:
    command: 'go mod download'
  build:
    command: 'go build -o api main.go'
    inputs:
      - 'main.go'
      - 'data/**/*'
      - 'go.mod'
  dev-go:
    command: 'go run main.go'
