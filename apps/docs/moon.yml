# apps/dashboard/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'
# type: 'application'
# stack: 'frontend'

project:
  name: 'documentation'

dependsOn:
  - 'core'


tags:
  - 'ui'
  - 'frontend'
  - 'docs'

tasks:
  dev:
    command: 'next dev -p 3002'
  build:
    command: 'next build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'lib/**/*'
      - 'public/**/*'
