# apps/dashboard/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'
# type: 'application'
# stack: 'frontend'

project:
  name: 'website'

dependsOn:
  - 'core'


tags:
  - 'ui'
  - 'frontend'
  - 'website'

tasks:
  dev:
    command: 'next dev -p 3001'
  build:
    command: 'next build'
    inputs:
      - 'app/**/*'
      - 'components/**/*'
      - 'lib/**/*'
      - 'public/**/*'

  storybook:
    command: 'bun run storybook'

  chromatic:
    command: 'bun run chromatic'
