# apps/dashboard/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'
stack: 'frontend'

project:
  name: 'Clawesome Dashboard'
  description: 'Clawesome Dashboard to manage your AI swarm'

dependsOn:
  - 'core'
  - 'ui'
  - 'cli'
  - 'gateway'

tags:
  - 'core'
  - 'ui'
  - 'frontend'
  - 'dashboard'

tasks:
  dev:
    command: 'next dev -p 3000'
  build:
    command: 'next build'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
  
  # Desktop Forge Tasks
  sync-sidecars:
    script: 'mkdir -p src-tauri/binaries && cp ../gateway/clawesome-gateway src-tauri/binaries/clawesome-gateway-aarch64-apple-darwin && cp ../cli/clawesome-cli src-tauri/binaries/clawesome-cli-aarch64-apple-darwin'
    deps:
      - 'cli:build'
      - 'gateway:build'
    inputs:
      - '/apps/gateway/clawesome-gateway'
      - '/apps/cli/clawesome-cli'
    outputs:
      - 'src-tauri/binaries/*'

  tauri-dev:
    command: 'bunx @tauri-apps/cli dev'
    deps:
      - 'sync-sidecars'
  
  tauri-build:
    script: 'export PATH="$HOME/.cargo/bin:$PATH" && bunx @tauri-apps/cli build'
    deps:
      - 'build'
      - 'sync-sidecars'
    outputs:
      - 'src-tauri/target/release/bundle/**/*'

  storybook:
    command: 'bun run storybook'
  chromatic:
    command: 'bun run chromatic'
