# apps/dashboard/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'
stack: 'frontend'

project:
  name: 'Clawesome Dashboard'
  description: 'Clawesome Dashboard to manage your AI swarm'

dependsOn:
  - 'core'
  - 'ui'
  - 'clawesome-cli'
  - 'wss-gateway'

tags:
  - 'core'
  - 'ui'
  - 'frontend'
  - 'dashboard'

tasks:
  dev:
    command: 'next dev -p 3000'
  build:
    command: 'next build'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
  
  # Desktop Forge Tasks
  sync-sidecars:
    command: 'mkdir -p src-tauri/binaries && cp ../gateway/clawesome-gateway src-tauri/binaries/clawesome-gateway-aarch64-apple-darwin && cp ../cli/clawesome-cli src-tauri/binaries/clawesome-cli-aarch64-apple-darwin'
    deps:
      - 'clawesome-cli:build'
      - 'wss-gateway:build'
    inputs:
      - '../gateway/clawesome-gateway'
      - '../cli/clawesome-cli'
    outputs:
      - 'src-tauri/binaries/*'

  tauri-dev:
    command: 'bun tauri dev'
    deps:
      - 'sync-sidecars'
  
  tauri-build:
    command: 'bun tauri build'
    deps:
      - 'build'
      - 'sync-sidecars'
    outputs:
      - 'src-tauri/target/release/bundle/**/*'

  storybook:
    command: 'bun run storybook'
  chromatic:
    command: 'bun run chromatic'
